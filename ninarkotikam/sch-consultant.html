<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Расписание</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: var(--tg-theme-bg-color, #f8f9fa);
      color: var(--tg-theme-text-color, #212529);
    }
    .btn-primary {
      background-color: var(--tg-theme-button-color, #0d6efd);
      border-color: var(--tg-theme-button-color, #0d6efd);
      color: var(--tg-theme-button-text-color, #ffffff);
    }
    .form-control {
      background-color: var(--tg-theme-secondary-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #212529);
      border-color: var(--tg-theme-hint-color, #ced4da);
      text-align: center;
      font-size: 1.1rem;
      padding: 12px 35px 12px 12px;
    }
    input[type="date"] {
      position: relative;
      cursor: pointer;
    }
    input[type="date"]::-webkit-calendar-picker-indicator {
      position: absolute;
      right: 10px;
      cursor: pointer;
      opacity: 0.6;
    }
    .alert {
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <h4 class="mb-4 text-center">📅 Получить расписание</h4>

    <div class="mb-3">
      <label for="dateField" class="form-label fw-bold">Выберите дату:</label>
      <input type="date" id="dateField" class="form-control" required>
    </div>

    <div id="statusAlert" class="alert d-none text-center" role="alert"></div>

    <button id="fetchBtn" class="btn btn-primary w-100 py-2 mt-2" onclick="fetchSchedule()">
      📋 Получить данные
    </button>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const dateField = document.getElementById('dateField');
    const statusAlert = document.getElementById('statusAlert');
    const fetchBtn = document.getElementById('fetchBtn');

    // --- Установка сегодняшней даты по Киеву (UTC+2 / UTC+3 с учётом летнего времени) ---
    function getKyivDateString() {
      const now = new Date();
      // Формируем строку даты в часовом поясе Europe/Kyiv
      const kyivDate = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Kyiv' }));
      const yyyy = kyivDate.getFullYear();
      const mm = String(kyivDate.getMonth() + 1).padStart(2, '0');
      const dd = String(kyivDate.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    // Устанавливаем сегодняшнюю дату по умолчанию
    dateField.value = getKyivDateString();

    // --- Показ сообщений ---
    function showAlert(message, type = 'info') {
      statusAlert.textContent = message;
      statusAlert.classList.remove('d-none', 'alert-info', 'alert-success', 'alert-danger', 'alert-warning');
      statusAlert.classList.add(`alert-${type}`);
    }

    function hideAlert() {
      statusAlert.classList.add('d-none');
    }

    // --- Клик по полю открывает календарь ---
    dateField.addEventListener('click', function() {
      try {
        this.showPicker();
      } catch (e) {
        // Игнорируем, если метод недоступен
      }
    });

    // --- Отправка GET-запроса ---
    function fetchSchedule() {
      const selectedDate = dateField.value;
      
      if (!selectedDate) {
        showAlert('Пожалуйста, выберите дату.', 'warning');
        return;
      }

      // Показываем статус загрузки
      showAlert('⏳ Получаем расписание...', 'info');
      fetchBtn.disabled = true;
      fetchBtn.textContent = 'Загрузка...';

      // URL вашего вебхука n8n для получения расписания
      const webhookUrl = 'https://n8n.psyhodoc.xyz/webhook/sch-consultant';

      // Формируем URL с параметром date
      const url = `${webhookUrl}?date=${encodeURIComponent(selectedDate)}`;

      fetch(url, {
        method: 'GET',
        headers: {
          'Accept': 'application/json'
        }
      })
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP ошибка: ${response.status}`);
        }
        return response.json();
      })
      .then(data => {
        console.log('✅ Ответ от вебхука:', data);
        showAlert('✅ Данные получены! Проверьте консоль.', 'success');
        
        // Здесь позже будет обработка расписания из ответа
        // Например: отобразить список событий на выбранную дату
      })
      .catch(error => {
        console.error('❌ Ошибка:', error);
        showAlert(`❌ Ошибка: ${error.message}`, 'danger');
      })
      .finally(() => {
        fetchBtn.disabled = false;
        fetchBtn.textContent = '📋 Получить данные';
      });
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
