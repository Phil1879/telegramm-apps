<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Запись на консультацию</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .question-label {
      font-weight: bold;
      margin-bottom: 5px;
    }
    .answer-field {
      height: 120px;
      resize: none;
      overflow: auto;
    }
    .price-info {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      z-index: 1000;
      white-space: nowrap;
    }
  </style>
</head>
<body class="bg-light">
  <div class="container py-3">
    <h1 id="mainTitle" class="mb-4 text-center">Запись на консультацию</h1>

<div id="questions">
    <div class="mb-3">
        <label id="label0" for="q0" class="question-label">Ваше имя (как к вам обращаться)</label>
        <textarea id="q0" class="form-control answer-field" id="placeholder0" required></textarea>
    </div>
    <div class="mb-3">
        <label id="label1" for="q1" class="question-label">Номер телефона для связи (в формате +380xxxxxxxxx)</label>
        <textarea id="q1" class="form-control answer-field" id="placeholder1" required></textarea>
    </div>
</div>

    <button id="sendBtn" class="btn btn-primary w-100">Отправить</button>
  </div>

  <!-- Telegram SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // ========== ПОЛУЧАЕМ ПАРАМЕТРЫ ИЗ URL ==========
    const urlParams = new URLSearchParams(window.location.search);
    const lang = urlParams.get('lang') || 'ru';
    const price = urlParams.get('price') || '75';

    // ========== ТЕКСТЫ ДЛЯ РАЗНЫХ ЯЗЫКОВ ==========
    const texts = {
      ru: {
        title: 'Запись на консультацию',
        pageTitle: 'Запись на консультацию',
        label0: 'Ваше имя (как к вам обращаться)',
        label1: 'Номер телефона для связи (в формате +380xxxxxxxxx)',
        placeholder0: 'Ваш ответ...',
        placeholder1: 'Ваш ответ...',
        button: 'Отправить',
        alertEmpty: 'Пожалуйста, заполните все поля перед отправкой!',
        priceLabel: '💰 Стоимость консультации: '
      },
      uk: {
        title: 'Запис на консультацію',
        pageTitle: 'Запис на консультацію',
        label0: "Ваше ім'я (як до вас звертатися)",
        label1: "Номер телефону для зв'язку (у форматі +380xxxxxxxxx)",
        placeholder0: 'Ваша відповідь...',
        placeholder1: 'Ваша відповідь...',
        button: 'Надіслати',
        alertEmpty: 'Будь ласка, заповніть усі поля перед відправкою!',
        priceLabel: '💰 Вартість консультації: '
      }
    };

    // Выбираем нужный язык
    const t = texts[lang] || texts.ru;

    // ========== ПРИМЕНЯЕМ ТЕКСТЫ ==========
    document.title = t.pageTitle;
    document.getElementById('pageTitle').textContent = t.pageTitle;
    document.getElementById('mainTitle').textContent = t.title;
    document.getElementById('label0').textContent = t.label0;
    document.getElementById('label1').textContent = t.label1;
    document.getElementById('q0').placeholder = t.placeholder0;
    document.getElementById('q1').placeholder = t.placeholder1;
    document.getElementById('sendBtn').textContent = t.button;

    // Показываем стоимость
    const priceDiv = document.createElement('div');
    priceDiv.className = 'price-info';
    priceDiv.innerHTML = `${t.priceLabel}${price}$`;
    document.body.appendChild(priceDiv);

    // ========== ФУНКЦИЯ ОТПРАВКИ ==========
    function sendData() {
      // собираем все поля
      const fields = Array.from(document.querySelectorAll("textarea"));
      const answers = fields.map((field, index) => ({
        field_name: field.previousElementSibling.innerText,
        answer: field.value.trim()
      }));

      // проверка: все поля заполнены
      const empty = answers.find(a => !a.answer);
      if (empty) {
        tg.showAlert(t.alertEmpty);
        const firstEmptyField = fields.find(field => !field.value.trim());
        if (firstEmptyField) firstEmptyField.focus();
        return;
      }

      const data = {
        bot: '@PavloKazarianBot',
        task: 'insert',
        sub: 'new-user',
        user: tg.initDataUnsafe.user,
        answers: answers,
        lang: lang,
        price: price,
        status_msg: true
      };

      fetch("https://n8n.psyhodoc.xyz/webhook/kons-user-new", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      })
      .then(res => {
        if (!res.ok) throw new Error("HTTP error " + res.status);
        return res.text();
      })
      .then(result => {
        console.log("✅ Успех:", result);
        tg.close();
      })
      .catch(err => {
        console.error("❌ Ошибка:", err);
        const errorData = {
          bot: '@Bulanova_school_bot',
          task: 1,
          user: tg.initDataUnsafe.user,
          error: err.message,
          status_msg: false
        };
        fetch("https://n8n.psyhodoc.xyz/webhook/kons-user-new", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(errorData),
        });
      });
    }

    // Назначаем обработчик на кнопку
    document.getElementById('sendBtn').onclick = sendData;
  </script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
