<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Завдання 1: Квадрат Декарта</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .square-field {
      height: 150px; 
      resize: none; 
      overflow: auto;
    }
  </style>
</head>
<body class="bg-light">
  <div class="container py-3">
    <h1 class="mb-4">Завдання 1: Квадрат Декарта</h1>

    <h2 class="mb-2">Якщо це трапиться:</h2>
    <div class="row mb-3">
      <div class="col-md-6 mb-2">
        <label class="question-label">Що буде, якщо це трапиться?</label>
        <textarea id="field1" class="form-control square-field" placeholder="Що буде, якщо це трапиться?" required></textarea>
      </div>
      <div class="col-md-6 mb-2">
        <label class="question-label">Чого не буде, якщо це трапиться?</label>
        <textarea id="field2" class="form-control square-field" placeholder="Чого не буде, якщо це трапиться?" required></textarea>
      </div>
    </div>

    <h2 class="mb-2">Якщо цього НЕ трапиться:</h2>
    <div class="row mb-3">
      <div class="col-md-6 mb-2">
        <label class="question-label">Що буде, якщо цього НЕ трапиться?</label>
        <textarea id="field1" class="form-control square-field" placeholder="Що буде, якщо це трапиться?" required></textarea>
      </div>
      <div class="col-md-6 mb-2">
        <label class="question-label">Чого не буде, якщо цього НЕ трапиться?</label>
        <textarea id="field2" class="form-control square-field" placeholder="Чого не буде, якщо це трапиться?" required></textarea>
      </div>
    </div>

    <button class="btn btn-primary w-100" onclick="sendData()">Відправити завдання</button>
  </div>

  <!-- Telegram SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function sendData() {
      // собираем все поля
      const fields = Array.from(document.querySelectorAll("textarea"));
      const answers = fields.map((field, index) => ({
        field_name: field.previousElementSibling.innerText,
        answer: field.value.trim()
      }));

        // проверка: все поля заполнены
        const empty = answers.find(a => !a.answer);
        if (empty) {
        tg.showAlert("Будь ласка, заповніть усі поля перед відправкою!");
        // ставим фокус на первое пустое поле
        const firstEmptyField = fields.find(field => !field.value.trim());
        if (firstEmptyField) firstEmptyField.focus();
        return;
        }


    const data = {
        bot: 'Досягайка',
        task: 'Завдання 1: Квадрат Декарта',
        user: tg.initDataUnsafe.user,
        answers: answers,
        status_msg: true
      };
      fetch("https://n8n.psyhodoc.xyz/webhook/dz-dosigaika", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      })
      .then(res => {
        if (!res.ok) throw new Error("HTTP error " + res.status);
        return res.text();
      })
      .then(result => {
        console.log("✅ Успех:", result);
        tg.close();
      })
      .catch(err => {
        console.error("❌ Ошибка:", err);
        const errorData = {
          bot: 'Досягайка',
          task: 1,
          user: tg.initDataUnsafe.user,
          error: err.message,
          status_msg: false
        };
        fetch("https://n8n.psyhodoc.xyz/webhook/dz-dosigaika", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(errorData),
        });
      });
    }
  </script>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
