<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ШНС_10</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .question-label {
      font-weight: bold;
      margin-bottom: 5px;
    }
    .answer-field {
      height: 120px;
      resize: none;
      overflow: auto;
    }
  </style>
</head>
<body class="bg-light">
  <div class="container py-3">
    <h1 class="mb-4">Завдання 11: Квадрат Декарта</h1>

    <h2 class="mb-2">Якщо ви залишитесь в співзалежних стосунках</h2>
    <div class="row mb-3">
      <div class="col-md-6 mb-2">
        <label class="question-label">Що буде, якщо це трапиться?</label>
        <textarea id="field1" class="form-control square-field" placeholder="20 плюсів ЗАЛИШИТИСЯ В співзалежності" required></textarea>
      </div>
      <div class="col-md-6 mb-2">
        <label class="question-label">Чого не буде, якщо це трапиться?</label>
        <textarea id="field2" class="form-control square-field" placeholder="20 мінусів ЗАЛИШИТИСЯ В співзалежності" required></textarea>
      </div>
    </div>

    <h2 class="mb-2">Якщо ви НЕ залишитесь в співзалежних стосунках:</h2>
    <div class="row mb-3">
      <div class="col-md-6 mb-2">
        <label class="question-label">Що буде, якщо цього НЕ трапиться?</label>
        <textarea id="field1" class="form-control square-field" placeholder="20 плюсів ЯКЩО ПОЗБУТИСЯ співзалежності" required></textarea>
      </div>
      <div class="col-md-6 mb-2">
        <label class="question-label">Чого не буде, якщо цього НЕ трапиться?</label>
        <textarea id="field2" class="form-control square-field" placeholder="20 мінусів ЯКЩО ПОЗБУТИСЯ співзалежності" required></textarea>
      </div>
    </div>

    <button class="btn btn-primary w-100" onclick="sendData()">Надіслати</button>
  </div>

  <!-- Telegram SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function sendData() {
      const fields = Array.from(document.querySelectorAll("textarea"));
      const answers = fields.map((field, index) => ({
        field_name: field.previousElementSibling.innerText,
        answer: field.value.trim()
      }));

      const empty = answers.find(a => !a.answer);
      if (empty) {
        tg.showAlert("Будь ласка, заповніть усі поля перед відправкою!");
        const firstEmptyField = fields.find(field => !field.value.trim());
        if (firstEmptyField) firstEmptyField.focus();
        return;
      }

      const data = {
        bot: '@Bulanova_school_bot',
        task: 11,
        sub: 0,
        user: tg.initDataUnsafe.user,
        answers: answers,
        status_msg: true
      };

      fetch("https://n8n.psyhodoc.xyz/webhook/school-dz", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      })
      .then(res => {
        if (!res.ok) throw new Error("HTTP error " + res.status);
        return res.text();
      })
      .then(result => {
        console.log("✅ Успех:", result);
        tg.close();
      })
      .catch(err => {
        console.error("❌ Ошибка:", err);
        const errorData = {
          bot: '@Bulanova_school_bot',
          task: 10,
          user: tg.initDataUnsafe.user,
          error: err.message,
          status_msg: false
        };
        fetch("https://n8n.psyhodoc.xyz/webhook/school-dz", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(errorData),
        });
      });
    }
  </script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
