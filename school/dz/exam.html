  <!-- Telegram SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

        // Покращення радіокнопок: клік на всю строку
    document.querySelectorAll('.radio-option').forEach(option => {
      const radio = option.querySelector('input[type="radio"]');
      const label = option.querySelector('label');
      
      // Якщо лейбл не обгортає радіо, робимо клікабельним весь блок
      option.style.cursor = 'pointer';
      option.addEventListener('click', function(e) {
        // Якщо клік не саме на радіокнопці (щоб уникнути подвійного спрацювання)
        if (e.target !== radio) {
          radio.click();
        }
      });
      
      // Змінюємо стиль при наведенні
      option.addEventListener('mouseenter', function() {
        this.style.backgroundColor = '#f5f5f5';
      });
      option.addEventListener('mouseleave', function() {
        this.style.backgroundColor = '';
      });
    });
    
    // Виправляємо перенесення тексту – додаємо стилі dinamic
    const styleFix = document.createElement('style');
    styleFix.textContent = `
      .radio-option {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 8px 12px;
        border-radius: 8px;
        transition: background-color 0.2s ease;
      }
      .radio-option input {
        margin-top: 2px;
        flex-shrink: 0;
      }
      .radio-option label {
        flex: 1;
        margin-bottom: 0;
        line-height: 1.4;
        word-break: break-word;
      }
    `;
    document.head.appendChild(styleFix);

        function sendData() {
      // Збираємо всі текстові поля (textarea)
      const textareas = Array.from(document.querySelectorAll("#questions textarea"));
      const textAnswers = textareas.map((field, index) => ({
        field_name: field.previousElementSibling.innerText,
        answer: field.value.trim(),
        type: "textarea"
      }));

      // Перевіряємо текстові поля
      const emptyTextareaIndex = textareas.findIndex(field => !field.value.trim());
      if (emptyTextareaIndex !== -1) {
        tg.showAlert("Будь ласка, заповніть усі текстові поля перед відправкою!");
        textareas[emptyTextareaIndex].focus();
        textareas[emptyTextareaIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }

      // Збираємо всі радіо питання по порядку (від q1 до q30)
      const radioQuestions = [];
      for (let i = 1; i <= 30; i++) {
        const radioName = `q${i}`;
        const radioGroup = document.querySelectorAll(`input[name="${radioName}"]`);
        if (radioGroup.length > 0) {
          let selectedValue = null;
          let selectedIndex = null;
          radioGroup.forEach((radio, idx) => {
            if (radio.checked) {
              selectedValue = radio.value;
              selectedIndex = idx + 1;
            }
          });
          
          const questionDiv = document.querySelector(`input[name="${radioName}"]`).closest('.mb-3');
          const questionLabel = questionDiv.querySelector('.question-label');
          const field_name = questionLabel ? questionLabel.innerText : radioName;
          
          radioQuestions.push({
            field_name: field_name,
            answer: selectedValue,
            answer_number: selectedIndex,
            type: "radio",
            name: radioName,
            element: questionDiv
          });
        }
      }

      // Перевіряємо чи всі радіо питання мають відповідь
      const emptyRadioIndex = radioQuestions.findIndex(q => q.answer === null);
      if (emptyRadioIndex !== -1) {
        const emptyQuestion = radioQuestions[emptyRadioIndex];
        tg.showAlert(`Будь ласка, дайте відповідь на питання №${emptyRadioIndex + 1}`);
        emptyQuestion.element.scrollIntoView({ behavior: 'smooth', block: 'center' });
        const firstRadio = emptyQuestion.element.querySelector('input[type="radio"]');
        if (firstRadio) firstRadio.focus();
        return;
      }

      // Формуємо відповіді
      const allAnswers = [...textAnswers, ...radioQuestions.map(({ field_name, answer, answer_number, type }) => ({
        field_name: field_name,
        answer: answer,
        answer_number: answer_number,
        type: type
      }))];

      const data = {
        bot: '@Bulanova_school_bot',
        task: 20,
        sub: 0,
        user: tg.initDataUnsafe.user,
        answers: allAnswers,
        status_msg: true
      };

      fetch("https://n8n.psyhodoc.xyz/webhook/school-dz", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      })
      .then(res => {
        if (!res.ok) throw new Error("HTTP error " + res.status);
        return res.text();
      })
      .then(result => {
        console.log("✅ Успех:", result);
        tg.close();
      })
      .catch(err => {
        console.error("❌ Ошибка:", err);
        const errorData = {
          bot: '@Bulanova_school_bot',
          task: 20,
          user: tg.initDataUnsafe.user,
          error: err.message,
          status_msg: false
        };
        fetch("https://n8n.psyhodoc.xyz/webhook/school-dz", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(errorData),
        });
      });
    }
  </script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
